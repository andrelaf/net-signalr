events { }

http {
    # SignalR exige afinidade de sessão: a conexão (após negotiate) precisa voltar
    # ao MESMO nó que gerou o connectionToken. ip_hash garante essa "sticky session".
    # O backplane Redis cuida da distribuição das MENSAGENS entre os nós.
    upstream signalr_backend {
        ip_hash;
        server api1:8080;
        server api2:8080;
    }

    # Mapeia o header Upgrade para suportar o handshake de WebSocket.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        location / {
            proxy_pass         http://signalr_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 100s;
        }
    }
}
